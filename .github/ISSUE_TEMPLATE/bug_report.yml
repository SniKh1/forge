name: Bug report
description: Report a reproducible problem in Forge.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
        感谢反馈问题，请尽量补充完整信息。
  - type: input
    id: platform
    attributes:
      label: Platform / 平台
      description: macOS or Windows
      placeholder: macOS 15 / Windows 11
    validations:
      required: true
  - type: input
    id: target-client
    attributes:
      label: Target client / 目标客户端
      description: Claude, Codex, or Gemini
      placeholder: Claude
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge version / Forge 版本
      placeholder: v0.3.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. Open Forge Desktop
        2. Select Codex
        3. Click Install
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      render: shell
