name: Release Desktop Builds

on:
  push:
    tags:
      - 'v0.*.*'

jobs:
  build-desktop:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: ''
            bundles: 'app'
            artifact_name: 'forge-desktop-macos-arm64-app'
            artifact_glob: 'apps/forge-desktop/src-tauri/target/release/bundle/macos/Forge Desktop.app.tar.gz'
          - os: macos-15-intel
            target: ''
            bundles: 'dmg'
            artifact_name: 'forge-desktop-macos-x64-dmg'
            artifact_glob: 'apps/forge-desktop/src-tauri/target/release/bundle/dmg/*.dmg'
          - os: windows-latest
            target: ''
            bundles: 'msi'
            artifact_name: 'forge-desktop-windows-msi'
            artifact_glob: 'apps/forge-desktop/src-tauri/target/release/bundle/msi/*.msi'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop artifact
        working-directory: apps/forge-desktop
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri:build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          else
            npm run tauri:build -- --bundles ${{ matrix.bundles }}
          fi
        shell: bash

      - name: Pack macOS app bundle
        if: startsWith(matrix.os, 'macos-') && matrix.bundles == 'app'
        run: |
          APP_PATH="apps/forge-desktop/src-tauri/target/release/bundle/macos/Forge Desktop.app"
          TAR_PATH="apps/forge-desktop/src-tauri/target/release/bundle/macos/Forge Desktop.app.tar.gz"
          rm -f "$TAR_PATH"
          tar -C "$(dirname "$APP_PATH")" -czf "$TAR_PATH" "$(basename "$APP_PATH")"
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Forge ${{ github.ref_name }}
          body: |
            Download the installer or bundle asset for your platform from the list below.

            Full release details are tracked in CHANGELOG.md.
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.tar.gz
