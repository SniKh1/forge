name: Release Desktop Builds

on:
  push:
    tags:
      - 'v0.*.*'

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target aarch64-apple-darwin'
          - os: macos-latest
            args: '--target x86_64-apple-darwin'
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish desktop artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/forge-desktop
          tagName: ${{ github.ref_name }}
          releaseName: Forge ${{ github.ref_name }}
          releaseBody: |
            Download the installer or bundle asset for your platform from the list below.

            Full release details are tracked in CHANGELOG.md.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
