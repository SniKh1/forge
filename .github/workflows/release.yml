name: Release Forge Builds

on:
  push:
    tags:
      - 'v0.*.*'

jobs:
  verify-release-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag points to public branch
        run: |
          git fetch origin public:refs/remotes/origin/public
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/public"; then
            echo "Release tags must point to commits reachable from origin/public."
            exit 1
          fi

  build-desktop:
    needs: verify-release-source
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: ''
            bundles: 'dmg'
            artifact_name: 'forge-macos-arm64-dmg'
            artifact_glob: 'apps/forge-desktop/src-tauri/target/release/bundle/dmg/*.dmg'
          - os: windows-latest
            target: ''
            bundles: 'msi'
            artifact_name: 'forge-windows-msi'
            artifact_glob: 'apps/forge-desktop/src-tauri/target/release/bundle/msi/*.msi'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop artifact
        working-directory: apps/forge-desktop
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri:build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          else
            npm run tauri:build -- --bundles ${{ matrix.bundles }}
          fi
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Forge ${{ github.ref_name }}
          body: |
            Download the latest Forge installer for your platform from the assets below.

            Full release details are tracked in CHANGELOG.md.
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
