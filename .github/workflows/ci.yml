name: CI

on:
  push:
    branches:
      - master
      - dev
      - public
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check Forge CLI entrypoint
        run: node --check packages/forge-cli/bin/forge.js

      - name: Check Forge CLI source files
        run: find packages/forge-cli -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate Forge Desktop Rust lockfile
        run: cargo metadata --manifest-path apps/forge-desktop/src-tauri/Cargo.toml --locked --format-version 1 > /dev/null

      - name: Build Forge Desktop frontend
        run: npm run build --workspace apps/forge-desktop
